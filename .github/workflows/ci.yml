name: CI

# Build + test the Go app, then build + publish the Docker image to GHCR.
#
# Tagging scheme (handled by docker/metadata-action):
#   push to main        -> :latest        (moving pointer to newest main)
#                          :main          (same, conventional branch tag)
#                          :sha-<commit>  (immutable - pull any historical main build)
#   pull request        -> :pr-<number>   (moving pointer to the PR's latest commit)
#                          :sha-<commit>  (immutable per commit)
# Merging a PR lands a commit on main, which the push trigger below rebuilds as
# :latest + :sha-<commit> - so "merge" is covered without a separate trigger.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel superseded PR builds; never cancel a main build, so every main commit
# gets its own immutable :sha- image.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Build & test (native amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The cgo build needs two native libs, at the SAME versions the Dockerfile
      # pins (read straight from it so they can never drift):
      #   libonnxruntime.so - dlopen'd at runtime by onnxruntime_go
      #   libtokenizers.a   - statically linked by daulet/tokenizers
      - name: Fetch native libs (onnxruntime + tokenizers)
        run: |
          set -euo pipefail
          ORT=$(grep -oP 'ARG ORT_VERSION=\K[0-9.]+' Dockerfile)
          TOK=$(grep -oP 'ARG TOK_VERSION=\K[0-9.]+' Dockerfile)
          echo "onnxruntime=$ORT  tokenizers=$TOK"
          curl -fsSL -o /tmp/ort.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT}/onnxruntime-linux-x64-${ORT}.tgz"
          sudo mkdir -p /opt/onnxruntime
          sudo tar xzf /tmp/ort.tgz -C /opt/onnxruntime --strip-components=1
          curl -fsSL -o /tmp/tok.tgz \
            "https://github.com/daulet/tokenizers/releases/download/v${TOK}/libtokenizers.linux-amd64.tar.gz"
          sudo mkdir -p /opt/tokenizers
          sudo tar xzf /tmp/tok.tgz -C /opt/tokenizers

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Build
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: -L/opt/tokenizers
        run: go build ./...

      # ONNXRUNTIME_LIB makes the taskclf integration test run for real, so this
      # verifies the ONNX classifier on genuine amd64 hardware. Fireworks-backed
      # textimg experiments are opt-in in textimg-live.yml; required CI is fully
      # deterministic and never depends on an external model response.
      - name: Test
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: -L/opt/tokenizers
          ONNXRUNTIME_LIB: /opt/onnxruntime/lib/libonnxruntime.so
          LD_LIBRARY_PATH: /opt/onnxruntime/lib
        run: go test ./... -count=1

  docker:
    name: Build & publish image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Push for pushes to main and same-repo PRs. Fork PRs have no write creds,
      # so they build only (which still validates the Dockerfile).
      PUSH: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image name: ghcr.io/<owner>/yassai (== the repo). metadata-action
      # lowercases it, so an uppercase owner still yields a valid name.
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ env.PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # LOCAL_MODEL_URL: direct URL of the fine-tuned MiniCPM5 GGUF baked
          # in for the token-free local offload. The repo variable overrides
          # the default (set it empty to build Fireworks-only). Private HF
          # downloads authenticate via the hf_token BuildKit secret.
          # LOCAL_BASE_MODEL_URL: the UN-tuned MiniCPM5 base GGUF (official
          # openbmb artefact) for the second local lane (code_generation +
          # gated NER).
          # LOCAL_BASE_EXTENDED: set the repo variable to 1 ONLY when
          # LOCAL_BASE_MODEL_URL points at the assist fine-tune (unlocks
          # sentiment/summarisation/factual in the base lane).
          build-args: |
            LOCAL_MODEL_URL=${{ vars.LOCAL_MODEL_URL || 'https://huggingface.co/ashaibani/yassai-minicpm5-local/resolve/main/MiniCPM5-yassai-v2e3b-Q4_K_M.gguf' }}
            LOCAL_BASE_MODEL_URL=${{ vars.LOCAL_BASE_MODEL_URL || 'https://huggingface.co/ashaibani/yassai-minicpm5-local/resolve/main/MiniCPM5-yassai-assist-e3-r32-Q4_K_M.gguf' }}
            LOCAL_BASE_EXTENDED=${{ vars.LOCAL_BASE_EXTENDED || 'factual_knowledge,text_summarisation' }}
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          # Single-arch image -> keep a plain manifest (no provenance index), which
          # is simplest for the judge to pull.
          provenance: false

  docker-test:
    name: Test Docker image
    needs: docker
    runs-on: ubuntu-latest
    # Only run on main pushes (skip PRs to save minutes)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and test image
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}:sha-$(git rev-parse --short HEAD)"
          echo "Pulling $IMAGE..."
          docker pull "$IMAGE"

          # Create test input
          mkdir -p /tmp/test-input /tmp/test-output
          cat > /tmp/test-input/tasks.json << 'EOF'
          [
            {"task_id":"m1","prompt":"What is 17 * 23? Return only the number."},
            {"task_id":"f1","prompt":"What is the capital of France? Return only the name."}
          ]
          EOF

          # Run the agent and capture stderr to check classifier
          STDERR_FILE=/tmp/stderr.txt
          docker run --rm --platform linux/amd64 \
            -v /tmp/test-input:/input:ro \
            -v /tmp/test-output:/output \
            -e FIREWORKS_API_KEY="$FIREWORKS_API_KEY" \
            -e AGENT_MODEL=accounts/fireworks/models/minimax-m3 \
            -e CALLBACK_URL=off \
            "$IMAGE" 2>"$STDERR_FILE" || true

          echo "=== STDERR ==="
          cat "$STDERR_FILE"

          # Verify results.json exists and has 2 answers
          if [ ! -f /tmp/test-output/results.json ]; then
            echo "FAIL: results.json not created"
            exit 1
          fi
          ANSWER_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/test-output/results.json'))))")
          echo "Answer count: $ANSWER_COUNT"
          if [ "$ANSWER_COUNT" != "2" ]; then
            echo "FAIL: expected 2 answers, got $ANSWER_COUNT"
            exit 1
          fi

          # Verify classifier ran (should NOT see "classifier disabled" in stderr)
          if grep -q "classifier disabled" "$STDERR_FILE"; then
            echo "WARNING: classifier was disabled in the Docker image"
          else
            echo "OK: classifier is running in the Docker image"
          fi

          # Show results
          echo "=== RESULTS ==="
          cat /tmp/test-output/results.json
          echo ""
          echo "=== METRICS ==="
          cat /tmp/test-output/metrics.json || true
          echo ""
          echo "Docker image test PASSED"

      - name: Dress rehearsal (19 sample tasks, real amd64 timing)
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        # A full-set run on genuine amd64 CPU - the runner is no faster than
        # the judging VM, so a clean pass here (1 remote call, zero "Unable to
        # answer", sane duration) is leaderboard-grade evidence WITHOUT
        # spending a submission. The run reports to the callback worker under
        # the ci-rehearsal label for token/local/fallback inspection.
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}:sha-$(git rev-parse --short HEAD)"
          mkdir -p /tmp/rehearsal-in /tmp/rehearsal-out
          python3 -c "
          import json
          tasks = json.load(open('testdata/downloads_tasks_golden.json'))
          tasks = tasks if isinstance(tasks, list) else tasks['tasks']
          json.dump([{'task_id': t['task_id'], 'prompt': t['prompt']} for t in tasks], open('/tmp/rehearsal-in/tasks.json', 'w'))
          "
          START=$(date +%s)
          docker run --rm --platform linux/amd64 \
            -v /tmp/rehearsal-in:/input:ro \
            -v /tmp/rehearsal-out:/output \
            -e FIREWORKS_API_KEY="$FIREWORKS_API_KEY" \
            -e AGENT_MODEL=accounts/fireworks/models/minimax-m3 \
            -e CALLBACK_LABEL="ci-rehearsal @ sha-$(git rev-parse --short HEAD)" \
            "$IMAGE" 2>/tmp/rehearsal-stderr.txt || true
          WALL=$(( $(date +%s) - START ))
          echo "=== wall clock: ${WALL}s (judge cap 600s) ==="
          grep -E 'local reject|fallback|disabled' /tmp/rehearsal-stderr.txt || true
          python3 - << 'PYEOF'
          import json, sys
          results = json.load(open('/tmp/rehearsal-out/results.json'))
          metrics = json.load(open('/tmp/rehearsal-out/metrics.json'))
          empty = [r['task_id'] for r in results if not r['answer'].strip() or r['answer'] == 'Unable to answer.']
          print(f"answers: {len(results)}  local: {metrics.get('local_answers')}  calls: {metrics.get('calls')}  "
                f"tokens: {metrics.get('total_tokens')}  fallbacks: {metrics.get('fallbacks')}  empty: {empty}")
          if len(results) != 19 or empty:
              sys.exit('FAIL: missing or empty answers')
          if metrics.get('fallbacks', 0) > 0:
              print('WARNING: fallback answers shipped - inspect before resubmitting')
          PYEOF
          echo "Dress rehearsal PASSED"
